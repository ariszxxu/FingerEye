name: &task_name syringe_fingereye

zarr_path: &zarr_path your_zarr_path.zarr

ds: 12
da: 13
nv: 7

use_rs_indices: [0]
use_camera_indices: [0, 1, 2, 3, 4, 5]
use_sim_pose_decoder: False

dataset:
  _target_: fingereye.datasets.fingereye_dataset.FingerEyeDataset
  zarr_path: *zarr_path
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${horizon}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: 100
  replay_buffer_keys: ["obs/all_qpos", 
                      "obs/rgb_images_radio",
                      "obs/rs_rgb_images_radio",  
                      "actions/original_actions"] 

